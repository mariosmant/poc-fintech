# ============================================================================
# Test profile — Testcontainers dynamically configures datasource and Kafka
# ============================================================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

  # Disable OAuth2 resource server for tests (use @WithMockUser or mock JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18180/realms/fintech
          jwk-set-uri: http://localhost:18180/realms/fintech/protocol/openid-connect/certs

logging:
  level:
    com.mariosmant.fintech: DEBUG

# JWT hardening config — test values mirror the mock JwtDecoder in TestSecurityConfig.
# JwtDecoderConfig is @Profile("!test") so these values drive only assertion helpers
# / future integration tests that exercise the strict validator chain directly.
app:
  security:
    jwt:
      audiences: poc-fintech-api
      clock-skew-seconds: 60
      allowed-algorithms: RS256,PS256
      required-claims: sub,iat,exp
      authorized-party: poc-fintech-bff

