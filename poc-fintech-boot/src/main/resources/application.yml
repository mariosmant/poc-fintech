# ============================================================================
# POC Fintech — Application Configuration
# Spring Boot 4.0.5 | Java 25 | Jackson 3.x (tools.jackson) | NIST/SOC 2 hardened
# Keycloak OAuth2 | MDC Logging | Audit | Kafka DLQ | Rate Limiting
# ============================================================================

server:
  port: 8080
  # ── Server hardening (NIST SC-8, OWASP) ─────────────────────────────
  error:
    include-message: never            # Never expose error details (OWASP A09)
    include-stacktrace: never         # Never expose stack traces
    include-binding-errors: never     # Never expose validation internals
  servlet:
    # ── Session timeout — PCI DSS v4.0.1 §8.2.8 ─────────────────────
    # "Re-authenticate users after 15 minutes of inactivity."
    # Container-enforced idle timeout; in the `bff` profile (OAuth2 Login)
    # the session carries the server-held access/refresh token, so expiry
    # of this session forces a full OIDC re-auth round-trip with Keycloak.
    session:
      timeout: 15m
      cookie:
        # __Host- prefix binds the cookie to the exact origin (RFC 6265bis §4.1.3.2):
        # requires Secure, Path=/, and forbids Domain. Blocks subdomain / cross-origin
        # cookie injection. Works transparently because Spring Session / Tomcat set
        # Path=/ by default and we set Secure=true below.
        name: __Host-SESSION
        http-only: true               # Prevent XSS cookie theft (OWASP ASVS V3.4.1)
        secure: true                  # Cookies only over HTTPS (NIST SC-8)
        same-site: strict             # CSRF protection via SameSite (OWASP ASVS V3.4.3)
        path: /                       # Required for __Host- prefix

spring:
  application:
    name: poc-fintech

  # ── OAuth2 Resource Server (Keycloak JWT) ──────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/fintech
          jwk-set-uri: http://localhost:8180/realms/fintech/protocol/openid-connect/certs

  # ── Jackson 3.x hardening (defence-in-depth — also configured in JacksonConfig bean) ─
  # Note: In Jackson 3.x (tools.jackson), some features moved to new enums:
  #   - WRITE_DATES_AS_TIMESTAMPS → DateTimeFeature (spring.jackson.datatype.datetime)
  #   - FAIL_ON_NUMBERS_FOR_ENUMS → EnumFeature (spring.jackson.datatype.enum)
  jackson:
    default-property-inclusion: non_null   # Omit nulls — reduce info leakage
    deserialization:
      fail-on-unknown-properties: true     # Reject unknown fields (OWASP A01)
      fail-on-reading-dup-tree-key: true   # Reject duplicate keys
      fail-on-null-for-primitives: true    # Reject null for primitives
    serialization:
      fail-on-empty-beans: false           # Allow empty beans
    datatype:
      datetime:
        write-dates-as-timestamps: false   # ISO-8601 dates (NIST SP 800-92)
      enum:
        fail-on-numbers-for-enums: true    # Reject numeric enum values

  # ── Database (PostgreSQL) ───────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/fintech
    username: fintech
    password: fintech
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      leak-detection-threshold: 30000   # Detect connection leaks

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false                 # Prevent lazy-loading in controllers (OSIV anti-pattern)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC                # Consistent timezone handling

  # ── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ───────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

# ── Actuator / Observability ────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,auditchain
  endpoint:
    health:
      show-details: when-authorized
  # /actuator/info contributors — powered by build-info.properties and git.properties
  # generated at build time (see poc-fintech-boot/pom.xml).
  info:
    build:
      enabled: true
    git:
      enabled: true
      mode: full                      # Exposes full commit metadata (branch, id, time, tags)
    env:
      enabled: true                   # Allows app-scoped properties prefixed 'info.*' below
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: poc-fintech
  tracing:
    sampling:
      probability: 1.0
  # OpenTelemetry export configuration
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

# ── Springdoc / OpenAPI ──────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Resilience4j ─────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      fraudDetection:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      fxRate:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        register-health-indicator: true
      kafkaPublisher:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      fraudDetection:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      fxRate:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      kafkaPublisher:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

# ── Application custom config ────────────────────────────────────────────
app:
  cors:
    allowed-origins: http://localhost:5173
  keycloak:
    issuer-uri: http://localhost:8180/realms/fintech
  rate-limit:
    requests-per-minute: 100
  # ── Ultra-strict JWT validation (see JwtValidators / JwtDecoderConfig) ──
  # audiences          — comma-separated; AT LEAST ONE must appear in the token 'aud'.
  #                      Keycloak must emit this via an audience client-scope mapper
  #                      (see docker/keycloak/fintech-realm.json → clientScopes[].audience).
  # clock-skew-seconds — max accepted drift for 'exp'/'nbf' (keep small).
  # allowed-algorithms — comma-separated JWS algs; pins the decoder against alg-confusion.
  # required-claims    — comma-separated claims that MUST be present and non-blank.
  # authorized-party   — optional expected 'azp' (OAuth2 client id); blank = skip check.
  security:
    # CSRF double-submit cookie (enabled automatically under the `bff` profile).
    # When true, SecurityConfig installs a CookieCsrfTokenRepository that issues a
    # `__Host-XSRF-TOKEN` cookie (Secure, Path=/, SameSite=Strict, HttpOnly=false).
    # The SPA reads that cookie and echoes it in the `X-XSRF-TOKEN` request header.
    csrf:
      enabled: false
    # ── port-based rate limiter (Caffeine | Bucket4j-Redis) ──
    # `backend`             — `caffeine` (default, in-process bounded sliding
    #                         window) or `redis` (distributed token bucket
    #                         on Redis via Lettuce + Bucket4j 8.x). Selection is one
    #                         env-var flip: APP_SECURITY_RATE_LIMIT_BACKEND=redis.
    # `requests-per-minute` — refill rate. Falls back to the legacy
    #                         `app.rate-limit.requests-per-minute` when unset.
    # `window-seconds`      — refill window length.
    # `burst-capacity`      — token-bucket burst (Bucket4j only). 0 ⇒ = rpm,
    #                         which reproduces fixed-window behaviour.
    # `max-tracked-keys`    — Caffeine cap (~64 B/entry ⇒ ≈3 MB at 50 000).
    #                         Ignored when backend=redis (logged at startup).
    # `fail-open`           — Redis adapter only. true (default) = let request
    #                         through on Redis errors + WARN log; false = 429
    #                         (fail-closed).
    # `redis.key-prefix`    — Bucket4j namespace; segregated from session keys.
    rate-limit:
      backend: ${RATE_LIMIT_BACKEND:caffeine}
      requests-per-minute: ${app.rate-limit.requests-per-minute:100}
      window-seconds: 60
      burst-capacity: 0
      max-tracked-keys: 50000
      fail-open: ${RATE_LIMIT_FAIL_OPEN:true}
      redis:
        key-prefix: ${RATE_LIMIT_REDIS_PREFIX:rl:}
      # ── per-route bucket policies ──────────────────
      # The first matching `path-pattern` wins (YAML key order is preserved).
      # Unmatched requests use `default-policy.*` (which back-fills from the
      # legacy single-policy keys above when left unset).
      default-policy:
        requests-per-minute: 100
        window-seconds: 60
        burst-capacity: 100
      policies:
        transfers:
          path-pattern: /api/v1/transfers/**
          requests-per-minute: 20
          window-seconds: 60
          burst-capacity: 20
        accounts:
          path-pattern: /api/v1/accounts/**
          requests-per-minute: 60
          window-seconds: 60
          burst-capacity: 60
      # ── Resilience4j circuit breaker ───────────────
      # Wraps the Bucket4j-Redis adapter. When OPEN, requests transparently
      # fall back to an in-process Caffeine sidecar (bucket sizing identical;
      # only cluster-wide aggregation is lost). Enable in production where
      # Redis is the limiter backend.
      circuit-breaker:
        enabled: ${RATE_LIMIT_CB_ENABLED:false}
        failure-rate-threshold: 50
        sliding-window-size: 20
        minimum-number-of-calls: 5
        wait-duration-in-open-state-seconds: 30
        permitted-number-of-calls-in-half-open-state: 3
    # ── IP-reputation pre-filter ───────────────────
    # Runs before the rate limiter. Blocks /api/** requests whose remote
    # address is on a curated CIDR block-list before any token-bucket cost
    # is incurred. Enable in production by setting `enabled=true` and
    # populating `sources` (Spamhaus DROP / EDROP) and / or
    # `static-block-list` (operator-curated). The refresher pulls each
    # source on `refresh-interval` and atomically swaps the snapshot;
    # failures are fail-static — the previous snapshot is preserved.
    ip-reputation:
      enabled: ${IP_REPUTATION_ENABLED:false}
      refresh-interval: ${IP_REPUTATION_REFRESH:PT1H}
      refresh-interval-ms: ${IP_REPUTATION_REFRESH_MS:3600000}
      initial-delay-ms: ${IP_REPUTATION_INITIAL_DELAY_MS:60000}
      sources: []
      static-block-list: []
    jwt:
      audiences: poc-fintech-api
      clock-skew-seconds: 30
      allowed-algorithms: RS256,PS256
      required-claims: sub,iat,exp
  # ── Transactional Outbox shedding ─────────────────
  # Periodically deletes published outbox rows older than `retention` so the
  # table doesn't grow unboundedly. Only `published=true` rows are eligible;
  # unpublished rows are preserved regardless of age (alerting hook for stuck
  # publishers). Set `enabled=false` in environments that need to keep the
  # full event log indefinitely (e.g. forensic mirrors).
  outbox:
    shedding:
      enabled: ${OUTBOX_SHEDDING_ENABLED:true}
      retention: ${OUTBOX_RETENTION:P7D}
      interval-ms: ${OUTBOX_SHEDDING_INTERVAL_MS:3600000}
      initial-delay-ms: ${OUTBOX_SHEDDING_INITIAL_DELAY_MS:60000}
  audit:
    # ── Tamper-evident audit chain (PCI DSS §10.5, NIST AU-9(3)) ──
    # multi-key rotation:
    #   `keys`            — comma-separated list of `id:base64` pairs. The first
    #                       entry's `id` is used by the writer when
    #                       `active-key-id` is unset. Verification looks up
    #                       each row's recorded `key_id` against this ring.
    #   `active-key-id`   — id of the key the writer signs new rows with.
    #                       Bump after adding a new key, then restart.
    #   `hmac-key-base64` — single-key alias, becomes id=1 if `keys`
    #                       is empty. Kept for back-compat.
    # In production, source key material from a KMS/HSM (Vault, AWS KMS,
    # GCP KMS) and pass via env vars. Each key must decode to ≥ 32 bytes.
    chain:
      hmac-key-base64: ${AUDIT_CHAIN_HMAC_KEY:}
      keys: ${AUDIT_CHAIN_KEYS:}
      active-key-id: ${AUDIT_CHAIN_ACTIVE_KEY_ID:1}
      authorized-party: poc-fintech-bff

# ── Logging (MDC-enriched pattern with userId, requestId, traceId, spanId) ─
# The default console pattern is developer-friendly. For production, activate
# the 'json' profile (e.g. SPRING_PROFILES_ACTIVE=json) to emit Elastic Common
# Schema (ECS) JSON — one object per log event — that can be ingested by
# Fluent Bit / Filebeat / Vector without any transformation rules.
logging:
  level:
    com.mariosmant.fintech: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [userId=%X{userId:-anonymous}] [requestId=%X{requestId:-}] [traceId=%X{traceId:-}] [spanId=%X{spanId:-}] %logger{36} - %msg%n"

# ── Static /actuator/info contributors (env) ─────────────────────────────
# Surfaced by management.info.env.enabled=true. Keep these NON-SENSITIVE:
# /actuator/info is publicly reachable in this POC and MUST NOT leak secrets.
info:
  app:
    name: ${spring.application.name}
    description: "@project.description@"
    version: "@project.version@"
    encoding: "@project.build.sourceEncoding@"
    java:
      source: "@java.version@"
      target: "@java.version@"
  architecture:
    style: "Hexagonal (Ports & Adapters) + DDD + CQRS"
    patterns: "Transactional Outbox, Saga (orchestrated), Double-Entry Ledger"

---
# ──────────────────────────────────────────────────────────────────────────
# Profile: json
# Activate with SPRING_PROFILES_ACTIVE=json (can be combined with other profiles).
# Emits one JSON object per log event using Spring Boot 3.4+ native structured
# logging (org.springframework.boot.logging.structured.ecs.ElasticCommonSchema).
# All MDC keys (requestId, traceId, spanId, userId, username) are included
# automatically as top-level ECS fields.
# ──────────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: json

logging:
  structured:
    format:
      console: ecs          # Elastic Common Schema — widest tool support
    ecs:
      service:
        name: ${spring.application.name:poc-fintech}
        version: "@project.version@"
        environment: ${ENVIRONMENT:unknown}
  # Remove the pretty console pattern in JSON mode — the structured formatter
  # owns the entire output stream; leaving 'pattern.console' set here would
  # produce a mixed-format stream that breaks log shippers.
  pattern:
    console:                # (intentionally empty — structured formatter wins)


---
# ──────────────────────────────────────────────────────────────────────────
# Profile: bff
# Activate with SPRING_PROFILES_ACTIVE=bff (combinable with `json`).
# Turns on CSRF double-submit cookie protection. Intended for the React SPA that calls the backend with session cookies on
# the same origin (via reverse proxy) and the backend is the OAuth2 Client
# that holds the access/refresh token server-side.
# ──────────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: bff

app:
  security:
    csrf:
      enabled: true

# ── health indicator hygiene under `bff` ────────────
# spring-boot-starter-data-redis auto-registers a Redis health
# indicator that turns /actuator/health into a 503 when Redis is unreachable.
# That is the correct production signal, but the BFF smoke test boots without
# a Redis container (BFF_SESSION_STORE=none, RATE_LIMIT_BACKEND=caffeine),
# so we suppress the indicator unless either backend is actually using Redis.
management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}

# ── Distributed session storage ─────────────────────
# Default is `none` (= keep in-memory Tomcat session) so the smoke test
# boots without a Redis testcontainer. Production sets BFF_SESSION_STORE=redis
# alongside REDIS_HOST/REDIS_PORT/REDIS_PASSWORD/REDIS_SSL to externalise
# session state for horizontal scale + zero-downtime rolling restarts.
spring.session:
  store-type: ${BFF_SESSION_STORE:none}
  redis:
    namespace: poc-fintech:bff:session
    flush-mode: on_save
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  ssl:
    enabled: ${REDIS_SSL:false}
  timeout: 2s

# ── OAuth2 Client (server-side Authorization Code + PKCE) ───────────────
# Activated under the `bff` profile. The backend — not the browser — is the
# OAuth2 Client. Tokens never leave the server; the SPA authenticates via
# the __Host-SESSION cookie only. The client secret is sourced from the
# KEYCLOAK_BFF_CLIENT_SECRET environment variable in real deployments;
# the default below matches docker/keycloak/fintech-realm.json for dev.
spring.security.oauth2.client:
  registration:
    keycloak:
      client-id: poc-fintech-bff-server
      client-secret: ${KEYCLOAK_BFF_CLIENT_SECRET:poc-fintech-bff-dev-secret-change-me}
      authorization-grant-type: authorization_code
      client-authentication-method: client_secret_post
      scope: openid,profile,email
      # Default pattern; /login/oauth2/code/keycloak must be in Keycloak's redirectUris.
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  provider:
    keycloak:
      issuer-uri: http://localhost:8180/realms/fintech
      user-name-attribute: preferred_username

